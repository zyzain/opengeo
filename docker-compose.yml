version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: opengeo-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-opengeo_secure_2026}
      MYSQL_DATABASE: opengeo
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - opengeo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: opengeo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - opengeo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Consul服务发现
  consul:
    image: consul:1.15.4
    container_name: opengeo-consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: "agent -server -bootstrap-expect=1 -ui -client=0.0.0.0"
    networks:
      - opengeo-network

  # Jaeger链路追踪
  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: opengeo-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - opengeo-network

  # Prometheus监控
  prometheus:
    image: prom/prometheus:v2.47.2
    container_name: opengeo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - opengeo-network

  # Grafana可视化
  grafana:
    image: grafana/grafana:10.2.2
    container_name: opengeo-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - opengeo-network

networks:
  opengeo-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data: