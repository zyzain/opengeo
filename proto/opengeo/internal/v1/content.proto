syntax = "proto3";

package content;

option go_package = "opengeo/gen/go/opengeo/internal/v1/content";

// 内容管理服务
service ContentService {
  // 内容管理
  rpc CreateContent(CreateContentRequest) returns (Content);
  rpc GetContent(GetContentRequest) returns (Content);
  rpc UpdateContent(UpdateContentRequest) returns (Content);
  rpc DeleteContent(DeleteContentRequest) returns (DeleteContentResponse);
  rpc ListContents(ListContentsRequest) returns (ListContentsResponse);
  
  // 内容版本管理
  rpc CreateContentVersion(CreateContentVersionRequest) returns (ContentVersion);
  rpc GetContentVersion(GetContentVersionRequest) returns (ContentVersion);
  rpc ListContentVersions(ListContentVersionsRequest) returns (ListContentVersionsResponse);
  
  // AI内容优化
  rpc OptimizeContentForAI(OptimizeContentForAIRequest) returns (OptimizeContentForAIResponse);
  rpc AdaptContentForModel(AdaptContentForModelRequest) returns (AdaptContentForModelResponse);
  rpc CheckContentCompliance(CheckContentComplianceRequest) returns (CheckContentComplianceResponse);
  
  // 内容模板管理
  rpc CreateContentTemplate(CreateContentTemplateRequest) returns (ContentTemplate);
  rpc GetContentTemplate(GetContentTemplateRequest) returns (ContentTemplate);
  rpc ListContentTemplates(ListContentTemplatesRequest) returns (ListContentTemplatesResponse);
  
  // 知识图谱实体管理
  rpc CreateKnowledgeEntity(CreateKnowledgeEntityRequest) returns (KnowledgeEntity);
  rpc GetKnowledgeEntity(GetKnowledgeEntityRequest) returns (KnowledgeEntity);
  rpc ListKnowledgeEntities(ListKnowledgeEntitiesRequest) returns (ListKnowledgeEntitiesResponse);
  rpc LinkEntityToContent(LinkEntityToContentRequest) returns (LinkEntityToContentResponse);
}

// 内容相关消息
message CreateContentRequest {
  int64 user_id = 1;
  string title = 2;
  string body = 3;
  string content_type = 4;
  string schema_markup = 5;
}

message GetContentRequest {
  int64 content_id = 1;
}

message UpdateContentRequest {
  int64 content_id = 1;
  string title = 2;
  string body = 3;
  string schema_markup = 4;
}

message DeleteContentRequest {
  int64 content_id = 1;
}

message DeleteContentResponse {
  bool success = 1;
}

message ListContentsRequest {
  int64 user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  int32 status = 4;
  string content_type = 5;
}

message ListContentsResponse {
  repeated Content contents = 1;
  int32 total = 2;
}

message Content {
  int64 id = 1;
  int64 user_id = 2;
  string title = 3;
  string body = 4;
  string content_type = 5;
  int32 status = 6;
  string schema_markup = 7;
  float ai_optimization_score = 8;
  string created_at = 9;
  string updated_at = 10;
}

// 版本相关消息
message CreateContentVersionRequest {
  int64 content_id = 1;
  string title = 2;
  string body = 3;
  string schema_markup = 4;
  string ai_model_adaptation = 5;
}

message GetContentVersionRequest {
  int64 version_id = 1;
}

message ListContentVersionsRequest {
  int64 content_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListContentVersionsResponse {
  repeated ContentVersion versions = 1;
  int32 total = 2;
}

message ContentVersion {
  int64 id = 1;
  int64 content_id = 2;
  int32 version = 3;
  string title = 4;
  string body = 5;
  string schema_markup = 6;
  string ai_model_adaptation = 7;
  string created_at = 8;
}

// AI优化相关消息
message OptimizeContentForAIRequest {
  int64 content_id = 1;
  string optimization_type = 2;
}

message OptimizeContentForAIResponse {
  bool success = 1;
  string optimized_content = 2;
  float score = 3;
  string details = 4;
}

message AdaptContentForModelRequest {
  int64 content_id = 1;
  string target_model = 2;
}

message AdaptContentForModelResponse {
  bool success = 1;
  string adapted_content = 2;
  string model_specific_data = 3;
}

message CheckContentComplianceRequest {
  int64 content_id = 1;
}

message CheckContentComplianceResponse {
  bool compliant = 1;
  repeated ComplianceIssue issues = 2;
  string report = 3;
}

message ComplianceIssue {
  string issue_type = 1;
  string description = 2;
  string severity = 3;
  string suggestion = 4;
}

// 模板相关消息
message CreateContentTemplateRequest {
  int64 user_id = 1;
  string name = 2;
  string description = 3;
  string template_type = 4;
  string template_data = 5;
  bool is_public = 6;
}

message GetContentTemplateRequest {
  int64 template_id = 1;
}

message ListContentTemplatesRequest {
  int64 user_id = 1;
  string template_type = 2;
  bool is_public = 3;
  int32 page = 4;
  int32 page_size = 5;
}

message ListContentTemplatesResponse {
  repeated ContentTemplate templates = 1;
  int32 total = 2;
}

message ContentTemplate {
  int64 id = 1;
  int64 user_id = 2;
  string name = 3;
  string description = 4;
  string template_type = 5;
  string template_data = 6;
  bool is_public = 7;
  int32 usage_count = 8;
  float rating = 9;
  string created_at = 10;
}

// 知识图谱实体相关消息
message CreateKnowledgeEntityRequest {
  int64 user_id = 1;
  string entity_name = 2;
  string entity_type = 3;
  string entity_data = 4;
  string authority_links = 5;
}

message GetKnowledgeEntityRequest {
  int64 entity_id = 1;
}

message ListKnowledgeEntitiesRequest {
  int64 user_id = 1;
  string entity_type = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListKnowledgeEntitiesResponse {
  repeated KnowledgeEntity entities = 1;
  int32 total = 2;
}

message KnowledgeEntity {
  int64 id = 1;
  int64 user_id = 2;
  string entity_name = 3;
  string entity_type = 4;
  string entity_data = 5;
  string authority_links = 6;
  string created_at = 7;
}

message LinkEntityToContentRequest {
  int64 content_id = 1;
  int64 entity_id = 2;
}

message LinkEntityToContentResponse {
  bool success = 1;
}