name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Proto 检查
  proto-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: 'latest'
      
      - name: Proto Lint
        run: cd proto && buf lint
      
      - name: Breaking Change Detection
        if: github.event_name == 'pull_request'
        run: cd proto && buf breaking --against '.git#branch=main'

  # 后端构建和测试
  backend:
    runs-on: ubuntu-latest
    needs: proto-check
    strategy:
      matrix:
        go-version: ['1.21', '1.22']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      
      - name: Download dependencies
        run: go mod download
      
      - name: Build
        run: go build ./...
      
      - name: Unit Tests
        run: go test ./... -short -v -coverprofile=coverage.out
      
      - name: Upload coverage
        if: matrix.go-version == '1.22'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out

  # 前端构建和测试
  frontend:
    runs-on: ubuntu-latest
    needs: proto-check
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      
      - name: Install dependencies
        run: cd web && npm ci
      
      - name: Type check
        run: cd web && npm run typecheck
      
      - name: Lint
        run: cd web && npm run lint
      
      - name: Build
        run: cd web && npm run build
      
      - name: Unit Tests
        run: cd web && npm test

  # 开源版完整性验证
  oss-verify:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Verify OSS build
        run: |
          go build ./...
          go test ./... -short
      
      - name: Verify no enterprise imports
        run: |
          # 检查是否有企业版相关的 import
          if grep -r "enterprise" --include="*.go" .; then
            echo "Warning: Found enterprise references in OSS build"
          fi

  # Docker 构建验证
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Gateway image
        run: docker build -f deploy/docker/Dockerfile.gateway -t opengeo/gateway:latest .
      
      - name: Build Web image
        run: docker build -f web/Dockerfile -t opengeo/web:latest web/
